name: SEC EDGAR Live Pilot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      WINNER_TILT_SEC_EDGAR_LIVE_ENABLED: "true"
      WINNER_TILT_SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
      WINNER_TILT_SEC_EDGAR_ALLOWED_CIKS: "0000320193"
      WINNER_TILT_SEC_EDGAR_MAX_REQUESTS: "1"
      WINNER_TILT_SEC_EDGAR_KILL_SWITCH: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Verify secret is configured
        shell: bash
        run: |
          if [ -z "$WINNER_TILT_SEC_EDGAR_USER_AGENT" ]; then
            echo "SEC_EDGAR_USER_AGENT secret is missing"
            exit 1
          fi

      - name: Run bounded SEC EDGAR pilot
        run: |
          python -m winner_tilt.sec_edgar_pilot \
            --snapshot-dir runtime/sec-edgar-pilot

      - name: Upload ingest-only snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sec-edgar-live-pilot-${{ github.run_id }}
          path: runtime/sec-edgar-pilot/
          if-no-files-found: error
          retention-days: 7
